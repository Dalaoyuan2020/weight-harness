<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生端 — Weight Harness</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #3b82f6, #2563eb); padding: 20px; display: flex; align-items: center; gap: 12px; }
        .header a { color: #fff; text-decoration: none; font-size: 20px; }
        .header h1 { font-size: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding: 24px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #3b82f6; }

        /* 今日状态 */
        .status-bar {
            display: flex; justify-content: space-around; text-align: center;
            background: rgba(59,130,246,0.1); border-radius: 12px; padding: 16px; margin-bottom: 20px;
        }
        .status-item .number { font-size: 28px; font-weight: 800; }
        .status-item .label { font-size: 12px; color: #888; margin-top: 4px; }
        .countdown { color: #f59e0b; }

        /* 打卡 */
        .checkin-group { margin-bottom: 16px; }
        .checkin-group label { display: block; font-size: 14px; color: #888; margin-bottom: 6px; }
        .checkin-group input {
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05); color: #fff; font-size: 18px; text-align: center;
        }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; color: #fff; background: linear-gradient(135deg, #3b82f6, #2563eb); margin-top: 8px; }

        /* 今日任务清单 */
        .task-list { list-style: none; }
        .task-item {
            display: flex; align-items: center; gap: 12px; padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .task-checkbox { width: 24px; height: 24px; border-radius: 6px; border: 2px solid #3b82f6; background: transparent; cursor: pointer; flex-shrink: 0; }
        .task-checkbox:checked { background: #3b82f6; }
        .task-text { font-size: 15px; }
        .task-time { font-size: 12px; color: #666; margin-left: auto; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">←</a>
        <h1>💪 学生端 — 执行者</h1>
    </div>
    <div class="container">
        <!-- 今日状态 -->
        <div class="status-bar">
            <div class="status-item">
                <div class="number">48.0</div>
                <div class="label">当前体重(kg)</div>
            </div>
            <div class="status-item">
                <div class="number countdown">45</div>
                <div class="label">距离比赛(天)</div>
            </div>
            <div class="status-item">
                <div class="number">42.0</div>
                <div class="label">目标体重(kg)</div>
            </div>
        </div>

        <!-- 今日体重打卡 -->
        <div class="card">
            <h2>📊 今日体重打卡</h2>
            <div class="checkin-group">
                <label>晨起空腹体重 (kg)</label>
                <input type="number" step="0.1" placeholder="47.5">
            </div>
            <button class="btn">✅ 提交打卡</button>
        </div>

        <!-- 今日任务清单 -->
        <div class="card">
            <h2>📋 今日任务清单</h2>
            <ul class="task-list">
                <li class="task-item">
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">晨跑 5km</span>
                    <span class="task-time">06:30</span>
                </li>
                <li class="task-item">
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">早餐：鸡蛋2个 + 全麦面包1片</span>
                    <span class="task-time">07:30</span>
                </li>
                <li class="task-item">
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">专项训练 2小时</span>
                    <span class="task-time">09:00</span>
                </li>
                <li class="task-item">
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">午餐：鸡胸肉150g + 蔬菜沙拉</span>
                    <span class="task-time">12:00</span>
                </li>
                <li class="task-item">
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">力量训练 30min</span>
                    <span class="task-time">15:00</span>
                </li>
                <li class="task-item">
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">晚餐：少量碳水 + 蛋白质</span>
                    <span class="task-time">18:00</span>
                </li>
                <li class="task-item">
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">睡前体重记录</span>
                    <span class="task-time">21:30</span>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
